<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BarberPro - Inicia sesión en tu panel de administración de barbería">
    <title>BarberPro | Iniciar Sesión</title>
    <!-- PrimeIcons -->
    <link rel="stylesheet" href="https://unpkg.com/primeicons@7.0.0/primeicons.css">
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container" id="loginPage">
        <div class="login-wrapper">
            <!-- Logo -->
            <div class="login-logo">
                <i src="img/logo-dark.svg"></i>
                <span>BarberPro</span>
            </div>

            <!-- Card border gradient -->
            <div class="login-card-border">
                <div class="login-card">
                    <!-- Header -->
                    <div class="login-header">
                        <div class="login-avatar">
                            <i class="pi pi-user"></i>
                        </div>
                        <h1 class="login-title">Bienvenido</h1>
                        <p class="login-subtitle">Inicia sesión para continuar</p>
                    </div>

                    <!-- Error Message -->
                    <div class="login-error" id="loginError">
                        <i class="pi pi-exclamation-triangle"></i>
                        <span id="loginErrorText">Credenciales incorrectas</span>
                    </div>

                    <!-- Form -->
                    <form id="loginForm" autocomplete="on">
                        <div class="form-group">
                            <label for="email">Correo electrónico</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-input"
                                placeholder="tu@correo.com"
                                required
                                autocomplete="email"
                            >
                        </div>

                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <div class="password-wrapper">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-input"
                                    placeholder="Tu contraseña"
                                    required
                                    autocomplete="current-password"
                                >
                                <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar contraseña">
                                    <i class="pi pi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="checkbox-group">
                                <input type="checkbox" id="rememberMe" name="rememberMe">
                                <label for="rememberMe">Recordarme</label>
                            </div>
                            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                        </div>

                        <button type="submit" class="btn btn-primary" id="loginBtn">
                            <span id="loginBtnText">Iniciar Sesión</span>
                            <span id="loginSpinner" class="spinner" style="display:none;"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
